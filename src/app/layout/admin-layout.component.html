<div class="admin-shell">
  <aside class="sidebar" aria-label="Navigation principale">
    <h2 class="logo">LANCY</h2>
    <p class="subtitle">Admin Panel</p>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">🏠 Dashboard</a>
      <a routerLink="/projects" routerLinkActive="active">💼 Projects</a>
      <a routerLink="/escrow" routerLinkActive="active">🔒 Escrow</a>
      <a routerLink="/disputes" routerLinkActive="active">⚖️ Disputes</a>
      <a routerLink="/users" routerLinkActive="active">👤 Users</a>
    </nav>
  </aside>

  <div class="admin-main">
    <header class="admin-toolbar">
      <button type="button" (click)="toggleTheme()" class="btn-theme">
        <i class="fas" [ngClass]="theme.isDark() ? 'fa-sun' : 'fa-moon'"></i>
        {{ theme.isDark() ? 'Light mode' : 'Dark mode' }}
      </button>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
